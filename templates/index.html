<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Bank</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            background:linear-gradient(135deg,#1e3a8a,#2563eb);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:50px;
            width:400px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .logo{
            font-size:60px;
            margin-bottom:10px;
        }

        h1{
            color:#1e3a8a;
            margin-bottom:10px;
        }

        p{
            color:gray;
            margin-bottom:35px;
        }

        .btn{
            display:block;
            width:100%;
            padding:15px;
            margin-top:15px;
            text-decoration:none;
            border-radius:12px;
            font-size:16px;
            font-weight:bold;
            transition:0.3s;
        }

        .register{
            background:#1e3a8a;
            color:white;
        }

        .register:hover{
            background:#172554;
        }

        .login{
            border:2px solid #1e3a8a;
            color:#1e3a8a;
        }

        .login:hover{
            background:#1e3a8a;
            color:white;
        }

        .footer{
            margin-top:30px;
            color:gray;
            font-size:14px;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="logo">
            🏦
        </div>

        <h1>My Bank</h1>

        <p>
            Secure Digital Banking Experience
        </p>

        <a href="/register"
           class="btn register">

            Create Account

        </a>

        <a href="/login"
           class="btn login">

            Login

        </a>

        <div class="footer">

            Fast • Secure • Modern Banking

        </div>

    </div>

</body>
</html>
