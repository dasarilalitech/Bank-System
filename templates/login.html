<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:14px;
            margin-top:10px;
            margin-bottom:20px;
            border-radius:10px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#1e3a8a;
            color:white;
            font-size:16px;
        }

        a{
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="box">

    <h2>Login</h2>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <a href="/register">
        Create Account
    </a>

</div>

</body>
</html>
