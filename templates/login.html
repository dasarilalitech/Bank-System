<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | My Bank</title>
    <style>
        :root {
            --ink: #172033;
            --muted: #64748b;
            --line: #dbe4ef;
            --brand: #0f766e;
            --brand-dark: #115e59;
            --soft: #f6f8fb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            color: var(--ink);
            background:
                linear-gradient(120deg, rgba(246,248,251,0.96), rgba(246,248,251,0.86)),
                url("https://images.unsplash.com/photo-1553729459-efe14ef6055d?auto=format&fit=crop&w=1800&q=80") center/cover;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .auth {
            width: min(960px, 100%);
            display: grid;
            grid-template-columns: 0.95fr 1.05fr;
            background: rgba(255,255,255,0.92);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 26px 70px rgba(23,32,51,0.14);
            overflow: hidden;
        }

        .side {
            background: #172033;
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 520px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 800;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            background: var(--brand);
            display: grid;
            place-items: center;
        }

        .side h1 {
            font-size: 42px;
            line-height: 1.05;
            margin-bottom: 16px;
        }

        .side p {
            color: #cbd5e1;
            line-height: 1.7;
        }

        .panel {
            padding: 52px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .panel h2 {
            font-size: 34px;
            margin-bottom: 10px;
        }

        .hint {
            color: var(--muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        label {
            display: block;
            font-weight: 800;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            min-height: 50px;
            padding: 13px 14px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid var(--line);
            font: inherit;
            outline: none;
            background: var(--soft);
        }

        input:focus {
            border-color: var(--brand);
            background: white;
            box-shadow: 0 0 0 4px rgba(15,118,110,0.12);
        }

        button {
            width: 100%;
            min-height: 52px;
            border: none;
            border-radius: 8px;
            background: var(--brand);
            color: white;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
        }

        button:hover {
            background: var(--brand-dark);
        }

        .switch {
            margin-top: 22px;
            color: var(--muted);
        }

        .switch a,
        .home-link {
            color: var(--brand-dark);
            font-weight: 800;
            text-decoration: none;
        }

        .home-link {
            display: inline-block;
            margin-top: 22px;
        }

        @media (max-width: 760px) {
            .auth {
                grid-template-columns: 1fr;
            }

            .side {
                min-height: 260px;
                padding: 28px;
            }

            .panel {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <main class="auth">
        <section class="side">
            <div class="brand">
                <span class="brand-mark">B</span>
                <span>My Bank</span>
            </div>
            <div>
                <h1>Welcome back.</h1>
                <p>Sign in to view your account balances, transfer funds, and check your latest banking activity.</p>
            </div>
        </section>

        <section class="panel">
            <h2>Login</h2>
            <p class="hint">Use your username and password to continue to the dashboard.</p>

            <form method="POST">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" placeholder="Enter username" required>

                <label for="password">Password</label>
                <input id="password" type="password" name="password" placeholder="Enter password" required>

                <button type="submit">Login</button>
            </form>

            <p class="switch">New to My Bank? <a href="/register">Create Account</a></p>
            <a class="home-link" href="/">Back to home</a>
        </section>
    </main>
</body>
</html>
